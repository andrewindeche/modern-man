<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Man - Demo</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #BC2B2B;
      --primary-dark: #8a1c1c;
      --accent: #c9a961;
      --text: #333;
      --text-light: #666;
      --border: #e0e0e0;
      --background: #fafafa;
      --white: #fff;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--background);
      color: var(--text);
      line-height: 1.6;
    }

    /* Header */
    .header {
      background: var(--white);
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      text-decoration: none;
    }

    .logo span:first-child { color: var(--primary); }
    .logo span:last-child { color: var(--accent); }

    .search-bar {
      flex: 1;
      max-width: 500px;
    }

    .search-bar input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid var(--primary);
      border-radius: 30px;
      font-size: 0.95rem;
    }

    .header-icons {
      display: flex;
      gap: 0.75rem;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: var(--background);
      color: var(--primary);
      cursor: pointer;
      transition: 0.3s;
      position: relative;
    }

    .icon-btn:hover {
      background: var(--primary);
      color: white;
    }

    .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: var(--primary);
      color: white;
      font-size: 0.7rem;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Promo Banner */
    .promo-banner {
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 0.5rem;
      text-align: center;
      font-size: 0.9rem;
    }

    /* Categories */
    .categories {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 1rem 2rem;
      background: var(--white);
      border-bottom: 1px solid var(--border);
    }

    .cat-btn {
      padding: 0.6rem 1.2rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    /* Products Grid */
    .products-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .section-title {
      font-family: 'Georgia', serif;
      font-size: 1.75rem;
      color: var(--primary);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.5rem;
    }

    .product-card {
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: 0.3s;
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .product-image {
      height: 220px;
      background: #f0f0f0;
      position: relative;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .discount-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--primary);
      color: white;
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .product-info {
      padding: 1rem;
    }

    .product-info h3 {
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }

    .product-rating {
      color: var(--accent);
      font-size: 0.8rem;
      margin-bottom: 0.5rem;
    }

    .product-price {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* Heart Button */
    .heart-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      background: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .heart-btn.active {
      background: var(--primary);
      color: white;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-box {
      background: white;
      border-radius: 16px;
      width: 90%;
      max-width: 700px;
      max-height: 90vh;
      overflow: auto;
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
    }

    .modal-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      padding: 2rem;
    }

    .modal-image img {
      width: 100%;
      border-radius: 12px;
    }

    .modal-details h2 {
      font-family: 'Georgia', serif;
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .modal-rating {
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .modal-price {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .modal-desc {
      color: var(--text-light);
      margin-bottom: 1.5rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
    }

    .btn-add {
      flex: 1;
      padding: 1rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-add:hover {
      background: var(--primary-dark);
    }

    .btn-favorite {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--border);
      background: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-favorite.active {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 1rem;
      padding: 1rem 2rem;
      background: var(--white);
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 0.5rem 1rem;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-light);
    }

    .tab.active {
      color: var(--primary);
      border-bottom: 2px solid var(--primary);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header {
        flex-wrap: wrap;
        gap: 0.75rem;
      }
      
      .search-bar {
        order: 3;
        max-width: 100%;
      }

      .modal-content {
        grid-template-columns: 1fr;
      }

      .categories {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <!-- Promo Banner -->
  <div class="promo-banner">
    🎉 Get 20% off on all suits this week!
  </div>

  <!-- Header -->
  <header class="header">
    <a href="#" class="logo">
      <span>Modern</span><span>Man</span>
    </a>
    
    <div class="search-bar">
      <input type="text" placeholder="Search products...">
    </div>
    
    <div class="header-icons">
      <button class="icon-btn" onclick="showPage('home')">
        <i class="fas fa-home"></i>
      </button>
      <button class="icon-btn" onclick="showPage('cart')">
        <i class="fas fa-shopping-cart"></i>
        <span class="badge" id="cart-badge">0</span>
      </button>
      <button class="icon-btn" onclick="showPage('favorites')">
        <i class="fas fa-heart"></i>
        <span class="badge" id="fav-badge">0</span>
      </button>
    </div>
  </header>

  <!-- Categories -->
  <nav class="categories">
    <button class="cat-btn" onclick="filterCategory('all')">All</button>
    <button class="cat-btn" onclick="filterCategory('suits')">Suits</button>
    <button class="cat-btn" onclick="filterCategory('shirts')">Shirts</button>
    <button class="cat-btn" onclick="filterCategory('shoes')">Shoes</button>
  </nav>

  <!-- Main Content -->
  <main id="main-content">
    <!-- Products will be rendered here -->
  </main>

  <!-- Modal -->
  <div id="product-modal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-content">
        <div class="modal-image">
          <img id="modal-img" src="" alt="">
        </div>
        <div class="modal-details">
          <h2 id="modal-title">Product Title</h2>
          <div class="modal-rating" id="modal-rating">
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star"></i>
            <i class="fas fa-star-half-alt"></i>
            <span>(42 reviews)</span>
          </div>
          <div class="modal-price" id="modal-price">KES 0</div>
          <p class="modal-desc">Premium quality men's wear tailored for the modern gentleman. Perfect for any occasion.</p>
          <div class="modal-actions">
            <button class="btn-add" id="add-to-cart-btn" onclick="addToCart()">
              <i class="fas fa-shopping-cart"></i> Add to Cart
            </button>
            <button class="btn-favorite" id="add-to-fav-btn" onclick="toggleFavorite()">
              <i class="fas fa-heart"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Mock Products Data
    const products = [
      { id: 1, name: 'Classic Grey Suit', category: 'suits', price: 15000, discountedPrice: 12000, discount: 20, image: 'https://images.unsplash.com/photo-1594938298603-c8148c4dae35?w=400', rating: 4.5 },
      { id: 2, name: 'Navy Blue Shirt', category: 'shirts', price: 3500, discountedPrice: 2800, discount: 20, image: 'https://images.unsplash.com/photo-1596755094514-f54e02f7b6a2?w=400', rating: 4.2 },
      { id: 3, name: 'Black Oxford Shoes', category: 'shoes', price: 8500, discountedPrice: 6800, discount: 20, image: 'https://images.unsplash.com/photo-1614252369475-99eba1010f66?w=400', rating: 4.7 },
      { id: 4, name: 'White Linen Shirt', category: 'shirts', price: 4500, discountedPrice: 3600, discount: 20, image: 'https://images.unsplash.com/photo-1598033129183-c4f0c728b3d3?w=400', rating: 4.0 },
      { id: 5, name: 'Brown Tweed Jacket', category: 'suits', price: 12000, discountedPrice: 9600, discount: 20, image: 'https://images.unsplash.com/photo-1507003211169-0a1e722a9f87?w=400', rating: 4.3 },
      { id: 6, name: 'Leather Derby Shoes', category: 'shoes', price: 9500, discountedPrice: 7600, discount: 20, image: 'https://images.unsplash.com/photo-1613987249296-e5de9d9a6d82?w=400', rating: 4.6 },
      { id: 7, name: 'Blue Dress Shirt', category: 'shirts', price: 3800, discountedPrice: 3000, discount: 21, image: 'https://images.unsplash.com/photo-1594943328199-c2835d22d98d?w=400', rating: 4.1 },
      { id: 8, name: 'Charcoal Three-Piece Suit', category: 'suits', price: 18000, discountedPrice: 14400, discount: 20, image: 'https://images.unsplash.com/photo-1473966968609-0d5b86eca803?w=400', rating: 4.8 },
    ];

    // State
    let cart = [];
    let favorites = [];
    let currentCategory = 'all';
    let currentProduct = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderProducts();
    });

    // Render Products
    function renderProducts() {
      const filtered = currentCategory === 'all' 
        ? products 
        : products.filter(p => p.category === currentCategory);
      
      const html = filtered.map(product => `
        <div class="product-card" onclick="openProduct(${product.id})">
          <div class="product-image">
            <img src="${product.image}" alt="${product.name}">
            ${product.discount > 0 ? `<span class="discount-badge">-${product.discount}%</span>` : ''}
            <button class="heart-btn ${favorites.includes(product.id) ? 'active' : ''}" onclick="toggleFavorite(${product.id}, event)">
              <i class="fas fa-heart"></i>
            </button>
          </div>
          <div class="product-info">
            <h3>${product.name}</h3>
            <div class="product-rating">
              ${getStars(product.rating)}
            </div>
            <div class="product-price">KES ${product.discountedPrice || product.price}</div>
          </div>
        </div>
      `).join('');
      
      document.getElementById('main-content').innerHTML = `
        <section class="products-section">
          <h2 class="section-title">${currentCategory === 'all' ? 'Our Collection' : currentCategory.charAt(0).toUpperCase() + currentCategory.slice(1)}</h2>
          <div class="products-grid">${html}</div>
        </section>
      `;
    }

    function getStars(rating) {
      let stars = '';
      for (let i = 1; i <= 5; i++) {
        if (i <= rating) stars += '<i class="fas fa-star"></i>';
        else if (i - 0.5 <= rating) stars += '<i class="fas fa-star-half-alt"></i>';
        else stars += '<i class="far fa-star"></i>';
      }
      return stars;
    }

    // Filter
    function filterCategory(category) {
      currentCategory = category;
      renderProducts();
    }

    // Modal
    function openProduct(id) {
      currentProduct = products.find(p => p.id === id);
      if (!currentProduct) return;
      
      document.getElementById('modal-img').src = currentProduct.image;
      document.getElementById('modal-title').textContent = currentProduct.name;
      document.getElementById('modal-price').textContent = `KES ${currentProduct.discountedPrice || currentProduct.price}`;
      
      const favBtn = document.getElementById('add-to-fav-btn');
      favBtn.classList.toggle('active', favorites.includes(id));
      
      document.getElementById('product-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('product-modal').style.display = 'none';
    }

    // Cart
    function addToCart() {
      if (!currentProduct) return;
      
      cart.push(currentProduct.id);
      updateBadges();
      
      const btn = document.getElementById('add-to-cart-btn');
      btn.innerHTML = '<i class="fas fa-check"></i> Added!';
      setTimeout(() => {
        btn.innerHTML = '<i class="fas fa-shopping-cart"></i> Add to Cart';
      }, 1500);
      
      updateBadges();
    }

    function toggleFavorite(id, event) {
      if (event) event.stopPropagation();
      
      if (favorites.includes(id)) {
        favorites = favorites.filter(f => f !== id);
      } else {
        favorites.push(id);
      }
      
      updateBadges();
      renderProducts();
      closeModal();
    }

    function updateBadges() {
      document.getElementById('cart-badge').textContent = cart.length;
      document.getElementById('fav-badge').textContent = favorites.length;
    }

    // Simple page navigation (visual only)
    function showPage(page) {
      if (page === 'favorites') {
        const favProducts = products.filter(p => favorites.includes(p.id));
        const html = favProducts.map(product => `
          <div class="product-card" onclick="openProduct(${product.id})">
            <div class="product-image">
              <img src="${product.image}" alt="${product.name}">
            </div>
            <div class="product-info">
              <h3>${product.name}</h3>
              <div class="product-price">KES ${product.discountedPrice || product.price}</div>
            </div>
          </div>
        `).join('');
        
        document.getElementById('main-content').innerHTML = `
          <section class="products-section">
            <h2 class="section-title">My Favorites</h2>
            ${favProducts.length === 0 ? '<p style="text-align:center;color:#666;">No favorites yet</p>' : `<div class="products-grid">${html}</div>`}
          </section>
        `;
      } else if (page === 'cart') {
        const cartProducts = products.filter(p => cart.includes(p.id));
        const total = cartProducts.reduce((sum, p) => sum + (p.discountedPrice || p.price), 0);
        
        const html = cartProducts.map(product => `
          <div class="product-card">
            <div class="product-image">
              <img src="${product.image}" alt="${product.name}">
            </div>
            <div class="product-info">
              <h3>${product.name}</h3>
              <div class="product-price">KES ${product.discountedPrice || product.price}</div>
            </div>
          </div>
        `).join('');
        
        document.getElementById('main-content').innerHTML = `
          <section class="products-section">
            <h2 class="section-title">Shopping Cart</h2>
            ${cartProducts.length === 0 ? '<p style="text-align:center;color:#666;">Your cart is empty</p>' : `
              <div class="products-grid">${html}</div>
              <div style="text-align:center;margin-top:2rem;font-size:1.25rem;font-weight:700;">
                Total: KES ${total}
              </div>
            `}
          </section>
        `;
      } else {
        renderProducts();
      }
    }

    // Close modal on outside click
    document.getElementById('product-modal').addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-overlay')) {
        closeModal();
      }
    });
  </script>
</body>
</html>
